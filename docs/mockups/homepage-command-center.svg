<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="220" y1="40" x2="1420" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1728"/>
      <stop offset="1" stop-color="#09101C"/>
    </linearGradient>
    <linearGradient id="panel" x1="360" y1="180" x2="1230" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#152238"/>
      <stop offset="1" stop-color="#101A2C"/>
    </linearGradient>
    <linearGradient id="glow" x1="560" y1="248" x2="1060" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4A9EFF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#4A9EFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="980" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#02060D" flood-opacity="0.45"/>
    </filter>
    <style>
      .mono { font-family: "IBM Plex Mono", monospace; }
      .sans { font-family: "IBM Plex Sans", sans-serif; }
      .display { font-family: "Bebas Neue", "IBM Plex Sans", sans-serif; }
      .muted { fill: #7F90AE; }
      .soft { fill: #9DABC4; }
      .text { fill: #E6EDF8; }
      .accent { fill: #4A9EFF; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="#050A12"/>
  <rect x="24" y="24" width="1552" height="932" rx="28" fill="url(#bg)"/>
  <circle cx="1290" cy="118" r="180" fill="#4A9EFF" fill-opacity="0.06"/>
  <circle cx="290" cy="810" r="220" fill="#4A9EFF" fill-opacity="0.05"/>

  <rect x="78" y="72" width="1444" height="80" rx="18" fill="#10192B" stroke="#243651"/>
  <text x="122" y="122" class="display text" font-size="54" letter-spacing="6">Q<tspan class="accent">LAB</tspan></text>
  <text x="276" y="121" class="mono muted" font-size="22" letter-spacing="2">query faster • keep the graph feel</text>

  <g transform="translate(1026 90)">
    <rect x="0" y="0" width="124" height="42" rx="12" fill="#16243A" stroke="#31527F"/>
    <circle cx="24" cy="21" r="5" fill="#4A9EFF"/>
    <text x="38" y="27" class="mono accent" font-size="18">LOCAL</text>
    <rect x="140" y="0" width="126" height="42" rx="12" fill="#16243A" stroke="#31527F"/>
    <text x="172" y="27" class="mono soft" font-size="18">24 models</text>
    <rect x="282" y="0" width="170" height="42" rx="12" fill="#4A9EFF" fill-opacity="0.14" stroke="#4A9EFF"/>
    <text x="320" y="27" class="mono accent" font-size="18">12 runs today</text>
  </g>

  <rect x="78" y="188" width="1444" height="692" rx="28" fill="#0D1524" stroke="#22324D" filter="url(#shadow)"/>

  <text x="158" y="262" class="mono muted" font-size="24" letter-spacing="5">COMMAND CENTER</text>
  <text x="154" y="350" class="display text" font-size="112" letter-spacing="4">QUERY WITH</text>
  <text x="154" y="436" class="display accent" font-size="112" letter-spacing="4">CONTEXT IN VIEW</text>
  <text x="158" y="492" class="sans soft" font-size="30">A packaged Django control surface for interactive querying, saved explorations</text>
  <text x="158" y="530" class="sans soft" font-size="30">and schema inspection. Built to ship like companion tooling, not a separate app.</text>

  <rect x="132" y="578" width="936" height="164" rx="26" fill="url(#panel)" stroke="#2A3F61"/>
  <rect x="132" y="578" width="936" height="164" rx="26" fill="url(#glow)"/>
  <text x="172" y="624" class="mono muted" font-size="20" letter-spacing="4">QUICK ACTIONS</text>

  <rect x="170" y="650" width="860" height="60" rx="16" fill="#0E1626" stroke="#33537E"/>
  <circle cx="204" cy="680" r="8" fill="#4A9EFF"/>
  <text x="228" y="688" class="sans text" font-size="28">Query a model, open a saved query, or inspect schema…</text>
  <text x="960" y="688" class="mono accent" font-size="22">⌘K</text>

  <g transform="translate(1120 220)">
    <rect x="0" y="0" width="322" height="86" rx="20" fill="#121D31" stroke="#29405F"/>
    <text x="28" y="34" class="mono muted" font-size="18" letter-spacing="3">ACTIVE MODEL</text>
    <text x="28" y="64" class="sans text" font-size="34" font-weight="600">Device</text>
    <text x="246" y="64" class="mono accent" font-size="20">1.247 rows</text>

    <rect x="0" y="104" width="322" height="86" rx="20" fill="#121D31" stroke="#29405F"/>
    <text x="28" y="138" class="mono muted" font-size="18" letter-spacing="3">SAVED QUERIES</text>
    <text x="28" y="168" class="sans text" font-size="34" font-weight="600">18</text>
    <text x="230" y="168" class="mono soft" font-size="20">4 pinned</text>

    <rect x="0" y="208" width="322" height="86" rx="20" fill="#121D31" stroke="#29405F"/>
    <text x="28" y="242" class="mono muted" font-size="18" letter-spacing="3">AVG RUN TIME</text>
    <text x="28" y="272" class="sans text" font-size="34" font-weight="600">84ms</text>
    <text x="216" y="272" class="mono soft" font-size="20">cached where possible</text>
  </g>

  <g transform="translate(132 776)">
    <rect x="0" y="0" width="454" height="78" rx="18" fill="#121D31" stroke="#29405F"/>
    <text x="26" y="30" class="mono muted" font-size="18" letter-spacing="3">RECENT QUERIES</text>
    <text x="26" y="58" class="sans text" font-size="24">Device query • Team drilldown • Active devices</text>
  </g>

  <g transform="translate(608 776)">
    <rect x="0" y="0" width="454" height="78" rx="18" fill="#121D31" stroke="#29405F"/>
    <text x="26" y="30" class="mono muted" font-size="18" letter-spacing="3">MODEL ACTIVITY</text>
    <text x="26" y="58" class="sans text" font-size="24">Device 42 • Team 14 • Interface 9</text>
  </g>

  <g transform="translate(1084 776)">
    <rect x="0" y="0" width="358" height="78" rx="18" fill="#121D31" stroke="#29405F"/>
    <text x="26" y="30" class="mono muted" font-size="18" letter-spacing="3">PRIMARY ACTIONS</text>
    <text x="26" y="58" class="sans text" font-size="24">Open Builder • Browse Models</text>
  </g>

  <rect x="132" y="548" width="210" height="14" rx="7" fill="#22334E"/>
  <rect x="132" y="548" width="118" height="14" rx="7" fill="#4A9EFF"/>
</svg>
